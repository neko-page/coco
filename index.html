<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coco 快捷导航</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <!-- 移除了默认的 active 类，交由 JS 控制 -->
            <div class="sidebar-item" data-category="all" title="全部功能"><i class="fas fa-home"></i></div>
            <div class="sidebar-item" data-category="tool" title="通用工具"><i class="fas fa-toolbox"></i></div>
            <div class="sidebar-item" data-category="api" title="API接口"><i class="fas fa-plug"></i></div>
            <div class="sidebar-item" data-category="component" title="控件库"><i class="fas fa-puzzle-piece"></i></div>
            <div class="sidebar-item" data-category="data" title="数据"><i class="fas fa-database"></i></div>
            <div class="sidebar-item" data-category="editor" title="编辑器"><i class="fas fa-code"></i></div>
            <div class="sidebar-item" data-category="kongjianshangcheng" title="控件商城"><i class="fas fa-store"></i></div>
            <div class="sidebar-item" data-category="tutorial" title="教程手册"><i class="fas fa-book"></i></div>
            <div class="sidebar-item" data-category="ui" title="UI资源"><i class="fas fa-palette"></i></div>
            <div class="sidebar-item" data-category="mengzhongshui" title="梦众/名人堂"><i class="fas fa-star"></i></div>
            <div class="sidebar-item" data-category="teshu" title="特殊"><i class="fas fa-gem"></i></div>
            <div class="sidebar-item" data-category="maotool" title="猫系工具"><i class="fas fa-wrench"></i></div>
            <div class="sidebar-item settings-btn" title="设置"><i class="fas fa-cog"></i></div>
        </aside>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部栏 -->
            <header class="header">
                <div class="logo-section">
                    <img src="https://static.codemao.cn/pickduck/rk_gX8cSlx.png?hash=FledMqVJIqXs3At0Xl317dAny1jZ" alt="Logo" class="logo" id="siteLogo">
                    <span class="site-title">coco 快捷导航</span>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索资源...">
                </div>
                <div class="header-actions">
                    <button class="icon-btn theme-toggle" title="切换主题"><i class="fas fa-moon"></i></button>
                    <button class="icon-btn settings-btn" title="设置"><i class="fas fa-cog"></i></button>
                </div>
            </header>

            <!-- 分类内容区 -->
            <div id="contentArea">
                <!-- 卡片将由 JS 动态生成 -->
            </div>
        </main>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <i class="fas fa-cog fa-2x"></i>
                <h2 class="modal-title">设置</h2>
            </div>
            
            <div class="setting-item">
                <div class="setting-header">
                    <div class="setting-label">
                        <i class="fas fa-image"></i>
                        <span>Logo URL</span>
                    </div>
                </div>
                <div class="setting-desc">设置左上角显示的 Logo 图片地址（需以 https:// 开头）</div>
                <div class="input-group">
                    <input type="url" id="logoUrlInput" placeholder="https://...">
                </div>
            </div>

            <div class="setting-item">
                <div class="setting-header">
                    <div class="setting-label">
                        <i class="fas fa-cloud-download-alt"></i>
                        <span>数据加载方式</span>
                    </div>
                </div>
                <div class="setting-desc">选择资源列表的加载来源</div>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="loadMode" value="cdn" checked>
                        <span>CDN 模式</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="loadMode" value="page">
                        <span>本地模式</span>
                    </label>
                </div>
            </div>

            <div class="setting-item">
                <div class="setting-header">
                    <div class="setting-label">
                        <i class="fas fa-shield-alt"></i>
                        <span>二次确认跳转</span>
                    </div>
                    <div class="switch" id="confirmToggle">
                        <div class="switch-handle"></div>
                    </div>
                </div>
                <div class="setting-desc">点击卡片时弹出确认对话框，防止误触</div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" id="saveSettings">保存设置</button>
            </div>
        </div>
    </div>

    <!-- 二次确认弹窗 -->
    <div class="modal-overlay" id="confirmModal">
        <div class="modal confirm-modal">
            <div class="confirm-header" id="confirmTitle">卡片名称</div>
            <div class="confirm-body">
                <p id="confirmDesc">卡片描述</p>
                <a href="#" id="confirmLink" target="_blank" class="confirm-link">https://...</a>
            </div>
            <div class="confirm-footer">
                <button class="btn" id="confirmCancel">取消</button>
                <button class="btn btn-primary" id="confirmProceed">确定跳转</button>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js" type="module"></script>
</body>
</html>
